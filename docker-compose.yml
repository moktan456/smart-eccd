version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: smart_eccd_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smart_eccd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smart_eccd_pass}
      POSTGRES_DB: ${POSTGRES_DB:-smart_eccd}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-smart_eccd}']
      interval: 10s
      timeout: 5s
      retries: 5

  # Uncomment to add Redis for session/cache in the future
  # redis:
  #   image: redis:7-alpine
  #   container_name: smart_eccd_redis
  #   restart: unless-stopped
  #   ports:
  #     - '6379:6379'

volumes:
  postgres_data:
